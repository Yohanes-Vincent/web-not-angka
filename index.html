                            <a href="index.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7" rx="1" />
                                    <rect x="14" y="3" width="7" height="7" rx="1" />

        <!-- Main Content -->
        <main class="main-content" id="main-content">

                    rel="nofollow">TemplateMo</a></p>
        </footer>
    </div>

    <script src="js/templatemo-daynight-script.js"></script>
    <script>
        loadPage('songs/Kumau Cinta Yesus Selamanya.html');
        function loadPage(page) {
            fetch(page)
                .then(res => res.text())
                .then(html => {
                    const main = document.getElementById('main-content');
                    main.innerHTML = html;

                    // ⬇️ tunggu render selesai
                    requestAnimationFrame(() => {
                        autoScaleMain();
                    });
                });
        }

        const observer = new MutationObserver(() => {
            autoScaleMain();
        });

        observer.observe(document.getElementById("main-content"), {
            childList: true,
            subtree: true
        });

        function autoScaleMain() {
            const table = document.getElementById("table-not-angka");
            const main = window.innerWidth;

            if (!table || !main) return;

            const tableWidth = table.offsetWidth;
            const mainWidth = main.clientWidth;

            checkConsole("Panjang Tabel Chord", tableWidth);
            checkConsole("Panjang Main Content", mainWidth);

            if (tableWidth > mainWidth) {
                table.style.transform = `scale(0.76)`;
                table.style.transformOrigin = "top left";
            } else {
                table.style.transform = "scale(1)";
            }
        }

        const body = document.body;
        const openBtn = document.getElementById("openModalBtn");
        const openBtn1 = document.getElementById("openModalBtn1");
        const closeBtn = document.getElementById("closeModalBtn");
        const overlay = document.getElementById("modalOverlay");

        openBtn1.onclick = () => {
            overlay.classList.add("show");
        };
        openBtn.onclick = () => {
            overlay.classList.add("show");
        };

        closeBtn.onclick = () => {
            overlay.classList.remove("show");
        };

        // klik di luar modal untuk menutup
        overlay.onclick = (e) => {
            if (e.target === overlay) {
                overlay.classList.remove("show");
            }
        };

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                const overlay = document.getElementById("modalOverlay");

                if (overlay.classList.contains("show")) {
                    overlay.classList.remove("show");
                }
            }
        });

        function checkConsole(nama, hasil){
            const table = document.getElementById("checker");
            const row = table.insertRow();
            const cell1 = row.insertCell(0);
            const cell2 = row.insertCell(1);
            cell1.textContent = nama;
            cell2.textContent = hasil;
        }
    </script>
</body>

</html>
